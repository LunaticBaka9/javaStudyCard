<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>答题结果 - Java知识点记忆卡</title>
        <link rel="stylesheet" th:href="@{/css/style.css}" />
    </head>
    <body>
        <div class="container">
            <header>
                <h1>答题结果</h1>
                <a href="/" class="btn-secondary">返回首页</a>
            </header>

            <main>
                <section class="score-section">
                    <div class="score-card">
                        <div class="score-circle">
                            <span
                                class="score-text"
                                th:text="${correctCount} + '/' + ${totalQuestions}"
                            ></span>
                        </div>
                        <p class="score-message">
                            <span
                                th:if="${totalQuestions > 0 && correctCount * 100 / totalQuestions >= 80}"
                                >优秀！继续保持！</span
                            >
                            <span
                                th:if="${totalQuestions > 0 && correctCount * 100 / totalQuestions >= 60 && correctCount * 100 / totalQuestions < 80}"
                                >不错，再接再厉！</span
                            >
                            <span
                                th:if="${totalQuestions > 0 && correctCount * 100 / totalQuestions < 60}"
                                >还需要多多练习哦！</span
                            >
                        </p>
                    </div>
                </section>

                <section class="results-list">
                    <div
                        th:each="r : ${results}"
                        th:with="isCorrect=${r['isCorrect'] != null && r['isCorrect']}, isAttempted=${r['isAttempted'] != null && r['isAttempted']}"
                    >
                        <div
                            class="result-card"
                            th:class="${isCorrect} ? 'result-correct' : (${isAttempted} ? 'result-partial' : 'result-incorrect')"
                        >
                            <div class="result-header">
                                <h3 th:text="${r['question'].question}"></h3>
                                <span
                                    class="result-badge"
                                    th:class="${isCorrect} ? 'badge-correct' : 'badge-incorrect'"
                                    th:text="${r['isCorrect'] != null} ? (${isCorrect} ? '正确' : '错误') : '参考答案'"
                                ></span>
                            </div>

                            <div
                                th:if="${r['question'].type.name() == 'MULTIPLE_CHOICE'}"
                                class="result-details"
                            >
                                <p class="correct-answer">
                                    <strong>正确答案：</strong>
                                </p>
                                <div class="result-options-list">
                                    <span
                                        th:each="idx : ${r['question'].correctAnswers}"
                                        class="result-option result-option-correct"
                                        th:text="${r['question'].options[idx]}"
                                    ></span>
                                </div>
                                <p
                                    class="user-answer"
                                    th:if="${r['selectedAnswers'] != null}"
                                >
                                    <strong>你的选择：</strong>
                                </p>
                                <div
                                    class="result-options-list"
                                    th:if="${r['selectedAnswers'] != null}"
                                >
                                    <th:block
                                        th:each="idx : ${r['selectedAnswers']}"
                                    >
                                        <span
                                            th:if="${r['question'].correctAnswers.contains(idx)}"
                                            class="result-option result-option-correct"
                                            th:text="${r['question'].options[idx]}"
                                        ></span>
                                        <span
                                            th:if="${!r['question'].correctAnswers.contains(idx)}"
                                            class="result-option result-option-incorrect"
                                            th:text="${r['question'].options[idx]}"
                                        ></span>
                                    </th:block>
                                </div>
                            </div>

                            <div
                                th:if="${r['question'].type.name() == 'ESSAY'}"
                                class="result-details"
                            >
                                <p
                                    class="user-answer"
                                    th:if="${r['userAnswer'] != null}"
                                >
                                    <strong>你的答案：</strong>
                                    <span th:text="${r['userAnswer']}"></span>
                                </p>
                                <p class="reference-answer">
                                    <strong>参考答案：</strong>
                                    <span
                                        th:utext="${r['question'].answerHtml}"
                                    ></span>
                                </p>
                            </div>

                            <div
                                th:if="${r['question'].type.name() == 'SORTING'}"
                                class="result-details"
                            >
                                <p class="correct-answer">
                                    <strong>正确顺序：</strong>
                                </p>
                                <div class="result-options-list">
                                    <span
                                        th:each="idx : ${r['question'].correctOrder}"
                                        class="result-option result-option-correct"
                                        th:text="${r['question'].items[idx]}"
                                    ></span>
                                </div>
                                <p
                                    class="user-answer"
                                    th:if="${r['userOrder'] != null}"
                                >
                                    <strong>你的顺序：</strong>
                                </p>
                                <div
                                    class="result-options-list"
                                    th:if="${r['userOrder'] != null}"
                                >
                                    <th:block
                                        th:each="idx, iterStat : ${r['userOrder']}"
                                    >
                                        <span
                                            th:if="${iterStat.index < r['question'].correctOrder.size() && r['question'].correctOrder[iterStat.index] == idx}"
                                            class="result-option result-option-correct"
                                            th:text="${r['question'].items[idx]}"
                                        ></span>
                                        <span
                                            th:if="${iterStat.index >= r['question'].correctOrder.size() || r['question'].correctOrder[iterStat.index] != idx}"
                                            class="result-option result-option-incorrect"
                                            th:text="${r['question'].items[idx]}"
                                        ></span>
                                    </th:block>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <div class="anki-buttons">
                    <a
                        th:href="@{/quiz(category=${category}, count=${originalCount != null ? originalCount : totalQuestions}, types=${types})}"
                        class="anki-btn anki-btn-hard"
                        >再来一轮</a
                    >
                    <a href="/" class="anki-btn anki-btn-good">返回首页</a>
                </div>
            </main>
        </div>
    </body>
</html>
