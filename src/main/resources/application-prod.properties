spring.application.name=javaStudyCard
server.port=8082
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# 题库存储目录（支持相对路径或绝对路径）
# Windows默认: ./banks
# Linux部署建议: /opt/javaStudyCard/banks 或 ${HOME}/banks
banks.dir=/www/wwwroot/javaStudyCard/banks
